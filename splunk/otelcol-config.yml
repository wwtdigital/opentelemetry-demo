# Splunk-specific OTel Collector configuration
# This replaces the upstream demo's default collector with one that
# exports traces, metrics, and logs to Splunk Observability Cloud.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 8192
    timeout: 200ms
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
  resourcedetection:
    detectors: [system, env]
    override: false

exporters:
  # Traces and metrics to Splunk Observability Cloud via OTLP/HTTP
  # Per https://help.splunk.com/en/splunk-observability-cloud/.../otlphttp-exporter
  otlp_http/splunk:
    traces_endpoint: "https://ingest.${SPLUNK_REALM}.signalfx.com/v2/trace/otlp"
    metrics_endpoint: "https://ingest.${SPLUNK_REALM}.signalfx.com/v2/datapoint/otlp"
    headers:
      X-SF-Token: "${SPLUNK_ACCESS_TOKEN}"

  # Infrastructure metrics to Splunk IM
  signalfx:
    access_token: "${SPLUNK_ACCESS_TOKEN}"
    realm: "${SPLUNK_REALM}"

  # Debug logging (useful during setup, disable later)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp_http/splunk, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp_http/splunk, signalfx, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
